name: Agentic Approval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  checks: read
  pull-requests: write
  contents: read

jobs:
  gate:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required checks and auto-approve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const required = [
              'PR Governance Gates / governance-gates',
              'Deploy to Cloudflare Pages / build-and-deploy'
            ];

            const checks = await github.paginate(github.rest.checks.listForRef, {
              owner, repo, ref: sha, per_page: 100
            });

            const byName = new Map(checks.map(c => [c.name.trim().toLowerCase(), c]));
            const missing = [];
            const pending = [];
            const failed = [];

            for (const name of required) {
              const c = byName.get(name.trim().toLowerCase());
              if (!c) {
                missing.push(name);
                continue;
              }
              if (c.status !== 'completed') {
                pending.push(name);
                continue;
              }
              if (c.conclusion !== 'success') {
                failed.push(`${name} (${c.conclusion || 'unknown'})`);
              }
            }

            if (missing.length || pending.length || failed.length) {
              core.setFailed([
                missing.length ? `missing: ${missing.join(', ')}` : null,
                pending.length ? `pending: ${pending.join(', ')}` : null,
                failed.length ? `failed: ${failed.join(', ')}` : null,
              ].filter(Boolean).join(' | '));
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Agentic approval: all required checks passed.'
            });
