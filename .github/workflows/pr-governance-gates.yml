name: PR Governance Gates

on:
  pull_request:
    branches: [main, development]

jobs:
  governance-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docs/code coherence
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "$CHANGED"

          CODE_CHANGED=$(echo "$CHANGED" | grep -E '\.(ts|tsx|js|jsx|css)$' || true)
          DOCS_CHANGED=$(echo "$CHANGED" | grep -E '(^docs/|README\.md$|\.md$|\.mdx$|\.txt$|\.astro$|\.html$)' || true)

          if [ -n "$CODE_CHANGED" ] && [ -z "$DOCS_CHANGED" ]; then
            echo "Code changed without documentation updates."
            exit 1
          fi

          if echo "$CHANGED" | grep -E '\.md$' >/dev/null 2>&1; then
            if git diff "$BASE_SHA" "$HEAD_SHA" -- '*.md' | grep -E '\+.*(TODO|TBD|FIXME)' >/dev/null 2>&1; then
              echo "Documentation contains unresolved TODO/TBD/FIXME markers."
              exit 1
            fi
          fi

          echo "PR Governance Gates passed."
