name: PR Governance Gates

on:
  pull_request:
    branches: [main, development]

jobs:
  governance-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docs/code coherence
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "$CHANGED"

          CODE_CHANGED=$(echo "$CHANGED" | grep -E '\.(ts|tsx|js|jsx|css)$' || true)
          DOCS_CHANGED=$(echo "$CHANGED" | grep -E '\.(md|mdx|txt|rst|astro|html|yaml|yml|json|toml)$|^docs/|README' || true)
          CONFIG_CHANGED=$(echo "$CHANGED" | grep -E '\.(yml|yaml|json|toml)$|^\.github/' || true)

          # Only fail if code changed without ANY non-code file changes
          # Config/template/content changes count as documentation
          if [ -n "$CODE_CHANGED" ] && [ -z "$DOCS_CHANGED" ] && [ -z "$CONFIG_CHANGED" ]; then
            echo "Code changed without documentation or configuration updates."
            echo "If this is intentional (e.g., pure refactor), add a brief note to the PR description."
            exit 1
          fi

          if echo "$CHANGED" | grep -E '\.md$' >/dev/null 2>&1; then
            if git diff "$BASE_SHA" "$HEAD_SHA" -- '*.md' | grep -E '\+.*(TODO|TBD|FIXME)' >/dev/null 2>&1; then
              echo "Documentation contains unresolved TODO/TBD/FIXME markers."
              exit 1
            fi
          fi

          echo "PR Governance Gates passed."
